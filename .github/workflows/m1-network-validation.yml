name: m1-network-validation

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  validate-network-skeleton:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.53.0

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Terraform fmt
        run: terraform -chdir=terraform/modules/network fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=terraform/modules/network init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform/modules/network validate

      - name: TFLint
        run: |
          cd terraform/modules/network
          tflint --init || true
          tflint --format=compact

      - name: Trivy config scan (Terraform)
        run: trivy config terraform/ --severity HIGH,CRITICAL --exit-code 0

      - name: Trivy config scan (Ansible)
        run: trivy config ansible/ --severity HIGH,CRITICAL --exit-code 0

      - name: Install ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: Ansible lint
        run: ansible-lint ansible/playbooks/bootstrap.yml

      - name: Ansible lint roles
        run: ansible-lint ansible/roles/ || true

      - name: Network validation tests
        run: |
          python scripts/test_network.py --ci --skip-ping

      - name: Install conftest
        run: |
          LATEST=$(curl -s https://api.github.com/repos/open-policy-agent/conftest/releases/latest | grep tag_name | cut -d '"' -f4 | sed 's/v//')
          wget -q "https://github.com/open-policy-agent/conftest/releases/download/v${LATEST}/conftest_${LATEST}_Linux_x86_64.tar.gz" -O conftest.tar.gz
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: OPA Policy Check (conftest)
        run: |
          conftest test terraform/ -p policies/ --all-namespaces

      - name: Terraform init (OPNsense module)
        run: terraform -chdir=terraform/modules/network/opnsense init -backend=false

      - name: Terraform validate (OPNsense module)
        run: terraform -chdir=terraform/modules/network/opnsense validate

  nmap-scan:
    name: Network port scan (self-hosted only)
    runs-on: self-hosted
    if: ${{ !contains(runner.name, 'GitHub Actions') }}
    needs: validate-network-skeleton
    steps:
      - uses: actions/checkout@v4

      - name: Install nmap
        run: sudo apt-get update && sudo apt-get install -y nmap

      - name: Scan expected ports only
        run: |
          EXPECTED_PORTS="22,53,123"
          echo "Scanning for expected ports: ${EXPECTED_PORTS}"

          # Scan localhost for the expected port set
          SCAN_RESULT=$(nmap -sT -p ${EXPECTED_PORTS} 127.0.0.1 -oG - 2>/dev/null)
          echo "${SCAN_RESULT}"

          # Check for unexpected open ports outside our expected set
          ALL_OPEN=$(nmap -sT -p 1-1024 127.0.0.1 -oG - 2>/dev/null | grep 'Ports:' | grep -oP '\d+/open' | cut -d'/' -f1 || true)
          UNEXPECTED=""
          for port in ${ALL_OPEN}; do
            if ! echo "${EXPECTED_PORTS}" | grep -qw "${port}"; then
              UNEXPECTED="${UNEXPECTED} ${port}"
            fi
          done

          if [ -n "${UNEXPECTED}" ]; then
            echo "::error::Unexpected open ports found:${UNEXPECTED}"
            exit 1
          fi

          echo "Only expected ports are open. Scan passed."
