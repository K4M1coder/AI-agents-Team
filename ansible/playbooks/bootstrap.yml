---
- name: Bootstrap baseline hosts for M1
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Ensure basic packages on Debian family
      ansible.builtin.package:
        name:
          - curl
          - ca-certificates
          - chrony
        state: present
      when: ansible_os_family == "Debian"

    - name: Ensure basic packages on RedHat family
      ansible.builtin.package:
        name:
          - curl
          - ca-certificates
          - chrony
        state: present
      when: ansible_os_family == "RedHat"

    - name: Ensure time service is running
      ansible.builtin.service:
        name: chronyd
        state: started
        enabled: true
      when: ansible_os_family in ["Debian", "RedHat"]
