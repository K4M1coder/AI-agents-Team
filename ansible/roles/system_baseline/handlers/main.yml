---
# Handlers for system_baseline role

- name: restart sshd
  ansible.builtin.service:
    name: sshd
    state: restarted

- name: restart auditd
  ansible.builtin.service:
    name: "{{ auditd_service }}"
    state: restarted

- name: reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true
