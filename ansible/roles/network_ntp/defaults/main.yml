---
# NTP/chrony configuration defaults
ntp_service_name: chronyd
ntp_package_name: chrony

ntp_servers:
  - server: 0.pool.ntp.org
    options: iburst
  - server: 1.pool.ntp.org
    options: iburst
  - server: 2.pool.ntp.org
    options: iburst
  - server: 3.pool.ntp.org
    options: iburst

ntp_allowed_networks:
  - "10.0.0.0/8"

ntp_makestep_threshold: 1.0
ntp_makestep_limit: 3
